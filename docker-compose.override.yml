services:
  backend:
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
  frontend:
    build:
      context: ./frontend
      target: deps # Use deps stage for faster rebuilds
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
